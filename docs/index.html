<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAMIRCLAW — Live System Dashboard</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e27;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #container { display: flex; height: 100vh; }
        #sidebar {
            width: 280px;
            background: rgba(15, 23, 40, 0.95);
            border-right: 1px solid rgba(100, 200, 255, 0.2);
            padding: 20px;
            overflow-y: auto;
            box-shadow: -2px 0 10px rgba(0,0,0,0.3);
        }
        #main { flex: 1; display: flex; flex-direction: column; }
        #header {
            background: linear-gradient(135deg, #0f1728 0%, #1a2a4a 100%);
            border-bottom: 2px solid rgba(100, 200, 255, 0.3);
            padding: 15px 20px;
        }
        #header h1 { font-size: 24px; color: #64c8ff; }
        #header p { font-size: 11px; color: #888; margin-top: 3px; }
        #graph { flex: 1; background: #0a0e27; }
        svg { width: 100%; height: 100%; }
        .metric { background: rgba(20, 40, 80, 0.5); border: 1px solid rgba(100, 200, 255, 0.2); border-radius: 8px; padding: 12px; text-align: center; margin-bottom: 12px; }
        .metric-value { font-size: 20px; font-weight: bold; color: #64c8ff; }
        .metric-label { font-size: 10px; color: #999; margin-top: 4px; text-transform: uppercase; }
        .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #64c8ff; margin-bottom: 12px; margin-top: 15px; letter-spacing: 1px; }
        .agent-item { font-size: 10px; padding: 6px; background: rgba(50, 80, 150, 0.3); border-radius: 4px; margin-bottom: 6px; border-left: 2px solid #64c8ff; }
        .agent-name { color: #64c8ff; font-weight: bold; }
        .agent-status { color: #666; font-size: 9px; margin-top: 2px; }
        .status-live { color: #4caf50; font-weight: bold; }
        .link { stroke: rgba(100, 200, 255, 0.2); stroke-width: 1px; }
        .node { cursor: pointer; stroke: #333; stroke-width: 1.5px; }
        .node:hover { stroke: #64c8ff; stroke-width: 2.5px; }
        .node-label { font-size: 9px; font-weight: 600; text-anchor: middle; fill: #fff; pointer-events: none; }
        .node-infrastructure { fill: #E74C3C; }
        .node-specialists { fill: #3498DB; }
        .node-execution { fill: #2ECC71; }
        .node-quality { fill: #F39C12; }
    </style>
</head>
<body>
    <div id="container">
        <div id="sidebar">
            <div class="section-title">📊 System Status</div>
            <div id="metrics"></div>
            
            <div class="section-title">🟢 Active Agents</div>
            <div id="agents-list"></div>
            
            <div class="section-title">📁 Active Projects</div>
            <div id="projects-list"></div>
        </div>
        
        <div id="main">
            <div id="header">
                <h1>⚡ TAMIRCLAW LIVE</h1>
                <p>Real-time distributed intelligence system | <span class="status-live">● LIVE</span></p>
            </div>
            <div id="graph"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let simulation;

        async function fetchData() {
            try {
                const response = await fetch(`${API_URL}/dashboard`);
                const data = await response.json();
                updateDashboard(data);
            } catch (error) {
                console.error('API fetch failed:', error);
            }
        }

        function updateDashboard(data) {
            // Update metrics
            const metricsHtml = `
                <div class="metric">
                    <div class="metric-value">${data.metrics.total_agents}</div>
                    <div class="metric-label">Total Agents</div>
                </div>
                <div class="metric">
                    <div class="metric-value">${data.metrics.agents_online}</div>
                    <div class="metric-label">Online</div>
                </div>
                <div class="metric">
                    <div class="metric-value">${data.metrics.projects_active}</div>
                    <div class="metric-label">Projects</div>
                </div>
                <div class="metric">
                    <div class="metric-value">${data.metrics.quality_score}</div>
                    <div class="metric-label">Quality Score</div>
                </div>
            `;
            document.getElementById('metrics').innerHTML = metricsHtml;

            // Update agents list
            let agentsHtml = '';
            for (const [layer, agents] of Object.entries(data.network.nodes.reduce((acc, n) => {
                if (!acc[n.layer]) acc[n.layer] = [];
                acc[n.layer].push(n);
                return acc;
            }, {}))) {
                agentsHtml += `<div style="font-size: 9px; color: #888; margin-top: 8px; margin-bottom: 4px; font-weight: bold;">${layer}</div>`;
                for (const agent of agents) {
                    const statusColor = agent.status === 'online' ? '#4caf50' : '#ff9800';
                    agentsHtml += `<div class="agent-item">
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-status">
                            <span style="color: ${statusColor};">● ${agent.status}</span>
                            ${agent.working_on > 0 ? ` · Working on ${agent.working_on}` : ''}
                        </div>
                    </div>`;
                }
            }
            document.getElementById('agents-list').innerHTML = agentsHtml;

            // Update projects list
            let projectsHtml = '';
            for (const project of data.projects) {
                projectsHtml += `<div class="agent-item">
                    <div class="agent-name">${project.client}</div>
                    <div class="agent-status">${project.status.toUpperCase()} · ${project.progress}%</div>
                </div>`;
            }
            document.getElementById('projects-list').innerHTML = projectsHtml;

            // Update graph
            updateNetwork(data.network);
        }

        function updateNetwork(network) {
            const container = document.getElementById('graph');
            const width = container.offsetWidth;
            const height = container.offsetHeight;

            // Clear previous
            container.innerHTML = '';

            const svg = d3.select('#graph')
                .append('svg')
                .attr('width', width)
                .attr('height', height)
                .style('background', '#0a0e27');

            const g = svg.append('g');

            simulation = d3.forceSimulation(network.nodes)
                .force('link', d3.forceLink(network.edges).id(d => d.id).distance(100))
                .force('charge', d3.forceManyBody().strength(-500))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(30));

            // Links
            const link = g.append('g').selectAll('line')
                .data(network.edges)
                .enter()
                .append('line')
                .attr('class', 'link');

            // Nodes
            const node = g.append('g').selectAll('circle')
                .data(network.nodes)
                .enter()
                .append('circle')
                .attr('class', d => `node node-${d.layer}`)
                .attr('r', d => d.size);

            // Labels
            const labels = g.append('g').selectAll('text')
                .data(network.nodes)
                .enter()
                .append('text')
                .attr('class', 'node-label')
                .text(d => d.name.split(' ')[0]);

            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);

                node
                    .attr('cx', d => d.x)
                    .attr('cy', d => d.y);

                labels
                    .attr('x', d => d.x)
                    .attr('y', d => d.y + 4);
            });
        }

        // Initial load + refresh every 2 seconds
        fetchData();
        setInterval(fetchData, 2000);
    </script>
</body>
</html>
